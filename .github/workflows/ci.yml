name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup CRE TS toolchain (Javy plugin)
        run: bun run setup

      - name: Typecheck
        run: bun run typecheck

      - name: Compile workflows to WASM
        run: bun run compile:all
